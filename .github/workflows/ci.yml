name: CI

on:
  push:
    branches: [main, admin-rework]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build + api syntax check (matches local pre-push hook)
        run: npm run check

      - name: Run unit tests
        run: npm test
